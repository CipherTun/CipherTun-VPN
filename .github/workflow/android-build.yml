name: Android Build

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  build-libbox:
    name: Build libbox.aar (with Tor support)
    runs-on: ubuntu-latest
    outputs:
      built: ${{ steps.build.outcome == 'success' }}
    steps:
      - name: Checkout sing-box core source
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: dev-next
          path: sing-box-core

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;28.0.13004108"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build libbox.aar with Tor support
        id: build
        working-directory: sing-box-core
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/28.0.13004108
        run: |
          gomobile bind -v -androidapi=21 -javapkg=io.nekohasekai -libname=box \
            -tags=with_quic,with_wireguard,with_utls,with_clash_api,with_gvisor,with_grpc,with_dhcp,with_tailscale,with_embedded_tor \
            -trimpath -target=android -o libbox.aar \
            github.com/sagernet/sing-box/experimental/libbox ./experimental/libbox/mobile

      - name: Upload libbox.aar artifact
        uses: actions/upload-artifact@v4
        with:
          name: libbox-aar
          path: sing-box-core/libbox.aar
          if-no-files-found: error

  debug:
    name: Assemble Debug
    runs-on: ubuntu-latest
    needs: build-libbox
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Tor-enabled libbox.aar
        uses: actions/download-artifact@v4
        with:
          name: libbox-aar
          path: app/libs

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;28.0.13004108"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble debug APK
        env:
          LOCAL_PROPERTIES: ${{ secrets.LOCAL_PROPERTIES }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/28.0.13004108
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  release:
    name: Assemble Signed Release
    runs-on: ubuntu-latest
    needs: [debug, build-libbox]
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Tor-enabled libbox.aar
        uses: actions/download-artifact@v4
        with:
          name: libbox-aar
          path: app/libs

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;28.0.13004108"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check release signing secrets are present
        id: check_secrets
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode release keystore
        if: steps.check_secrets.outputs.has_secrets == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > app/release.keystore

      - name: Assemble signed release APK
        if: steps.check_secrets.outputs.has_secrets == 'true'
        env:
          LOCAL_PROPERTIES: ${{ secrets.LOCAL_PROPERTIES }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/28.0.13004108
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload release APK
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Skip notice
        if: steps.check_secrets.outputs.has_secrets == 'false'
        run: echo "RELEASE_KEYSTORE_BASE64 secret not set — skipping signed release build. Debug APK from the other job is still available."